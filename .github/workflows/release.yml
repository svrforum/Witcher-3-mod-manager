name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set version from tag
        run: npm version ${{ github.ref_name }} --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        run: npx electron-vite build && npx electron-builder --win nsis zip --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release with notes
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name=${{ github.ref_name }} \
            --jq '.body' > release_notes.md
          gh release edit ${{ github.ref_name }} --draft=false --notes-file release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
